            display: inline-block;
        }

    </style>
</head>
<body>

<h2 style="font-size: 5vw; text-align:center">Yêu cầu đã được gửi tới hệ thống!</h2>

<table>
    <tr>
        <th><strong>Web</strong></th>
        <th><strong>Thời gian</strong></th>
        <!-- <th><strong>Người gửi yêu cầu</strong></th> -->
    </tr>
    <tr>
        <td>{{ web }}</td>
        <td>{{ start_time }} - {{ end_time }}</td>
        <!-- <td>{{ request_name }}</td> -->
    </tr>
</table>
<br />

<p id="status" style="text-align: center; font-size: 2.5vw">{{ result_text }}</p>

<div class="button-container">
    <a href="/download/{{ job_id }}?request_name={{ request_name }}" 
    id="download" 
    style="display:none"
    class="btn">
        Tải file xuống 
    </a>

    <a href="/" class="btn">Quay lại</a>
</div>


<script>
async function poll() {
    const res = await fetch("/job/{{ job_id }}");
    const job = await res.json();

    if (job.status === "done") {
        if (job.row_count > 0) {
            // document.getElementById("status").innerText = ;
            document.getElementById("download").style.display = "block";
        // } else {
        //     // document.getElementById("status").innerText = "Completed";
        //     document.getElementById("empty-msg").style.display = "block";
        }
    } else if (job.status === "failed") {
        document.getElementById("status").innerText = "Không có thông tin được thu thập trong thời gian này.";
    } else {
        setTimeout(poll, 2000);
    }
}
poll();
</script>
