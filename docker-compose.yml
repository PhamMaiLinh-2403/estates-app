services:
  pipeline:
    build: .
    container_name: real_estate_pipeline
    restart: unless-stopped
    
    # Chrome requires large shared memory to prevent crashing
    shm_size: '4gb'
    
    ports:
      - "8000:8000"
    
    volumes:
      # Persist the output data (DB, CSVs, State)
      - ./output:/app/output
      
      # Mount input data (Read-Only recommendation, but RW works too)
      - "./Dữ liệu địa giới hành chính:/app/Dữ liệu địa giới hành chính:ro"
      - "./Dữ liệu thông tin kỹ thuật tài sản:/app/Dữ liệu thông tin kỹ thuật tài sản:ro"
      
      # Optional: Mount templates if you want to edit HTML without rebuilding
      - ./templates:/app/templates

    environment:
      - TZ=Asia/Ho_Chi_Minh